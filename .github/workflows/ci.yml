name: CI

# Lint the install script and — the point of the Q6 work — run the Living Docs
# invariant checker against the example corpus on every push and PR. A docs
# invariant violation fails the build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version consistency (VERSION ↔ every SKILL.md)
        run: ./scripts/check-version.sh

      - name: Test — lint-docs.sh fixture/parity corpus
        run: ./tests/lint-docs/run.sh

      - name: Test — lint-docs.sh diff-aware ratchet corpus
        run: ./tests/lint-docs/run-ratchet.sh

      - name: Lint — example docs bundle against the Living Docs invariants
        run: ./skills/living-docs/scripts/lint-docs.sh examples/linkly/docs

      - name: Lint — install.sh syntax, dry-run harnesses, docs invariants (make check)
        run: make check
