name: CI

# Runs the native `living-docs` CLI (Rust): fmt/clippy/test via the pinned Docker dev
# image (Dockerfile.dev, matching cli/rust-toolchain.toml), then `make check` builds
# the release binary and runs the Living Docs invariant + mermaid checks against the
# example corpus plus the hostile fixtures, on every push and PR. A formatting issue,
# lint warning, failing test, or invariant violation fails the build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version consistency (VERSION ↔ every SKILL.md)
        run: ./scripts/check-version.sh

      - name: cargo fmt --check (cli/, pinned Rust 1.96.0 via Dockerfile.dev)
        run: make cli-fmt

      - name: cargo clippy --all-targets -- -D warnings (cli/)
        run: make cli-clippy

      - name: cargo test (cli/)
        run: make cli-test

      - name: living-docs check — install.sh syntax, docs invariants, mermaid, fixtures
        run: make check
