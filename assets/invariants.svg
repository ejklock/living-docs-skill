<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="The five no-drift governance invariants of Living Docs">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10141c"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#accent2)"/>

  <text x="64" y="74" fill="#e6edf3" font-size="30" font-weight="700">The five no-drift invariants</text>
  <text x="64" y="104" fill="#8b949e" font-size="17">Re-derive any documentation decision from these. The rest is detail.</text>

  <!-- 5 cards -->
  <g>
    <rect x="64" y="140" width="216" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
    <circle cx="98" cy="178" r="18" fill="#21262d" stroke="#8A2BE2"/>
    <text x="98" y="184" fill="#a371f7" font-size="18" font-weight="700" text-anchor="middle">1</text>
    <text x="88" y="222" fill="#e6edf3" font-size="18" font-weight="700">Docs-first</text>
    <text x="88" y="250" fill="#8b949e" font-size="14">The repo file is the</text>
    <text x="88" y="270" fill="#8b949e" font-size="14">source of truth; the</text>
    <text x="88" y="290" fill="#8b949e" font-size="14">tracker is a mirror.</text>
  </g>
  <g>
    <rect x="296" y="140" width="216" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
    <circle cx="330" cy="178" r="18" fill="#21262d" stroke="#8A2BE2"/>
    <text x="330" y="184" fill="#a371f7" font-size="18" font-weight="700" text-anchor="middle">2</text>
    <text x="320" y="222" fill="#e6edf3" font-size="18" font-weight="700">One home per fact</text>
    <text x="320" y="250" fill="#8b949e" font-size="14">Each concept lives in</text>
    <text x="320" y="270" fill="#8b949e" font-size="14">exactly one file.</text>
    <text x="320" y="290" fill="#8b949e" font-size="14">Cross-reference, never copy.</text>
  </g>
  <g>
    <rect x="528" y="140" width="216" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
    <circle cx="562" cy="178" r="18" fill="#21262d" stroke="#8A2BE2"/>
    <text x="562" y="184" fill="#a371f7" font-size="18" font-weight="700" text-anchor="middle">3</text>
    <text x="552" y="222" fill="#e6edf3" font-size="18" font-weight="700">Indexed or it</text>
    <text x="552" y="244" fill="#e6edf3" font-size="18" font-weight="700">doesn't exist</text>
    <text x="552" y="272" fill="#8b949e" font-size="14">Every doc is reachable</text>
    <text x="552" y="292" fill="#8b949e" font-size="14">from an index. No orphans.</text>
  </g>
  <g>
    <rect x="760" y="140" width="216" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
    <circle cx="794" cy="178" r="18" fill="#21262d" stroke="#8A2BE2"/>
    <text x="794" y="184" fill="#a371f7" font-size="18" font-weight="700" text-anchor="middle">4</text>
    <text x="784" y="222" fill="#e6edf3" font-size="18" font-weight="700">Supersede,</text>
    <text x="784" y="244" fill="#e6edf3" font-size="18" font-weight="700">never rewrite</text>
    <text x="784" y="272" fill="#8b949e" font-size="14">Records are append-only.</text>
    <text x="784" y="292" fill="#8b949e" font-size="14">Mark old, write new.</text>
  </g>
  <g>
    <rect x="992" y="140" width="224" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
    <circle cx="1026" cy="178" r="18" fill="#21262d" stroke="#8A2BE2"/>
    <text x="1026" y="184" fill="#a371f7" font-size="18" font-weight="700" text-anchor="middle">5</text>
    <text x="1016" y="222" fill="#e6edf3" font-size="18" font-weight="700">No change</text>
    <text x="1016" y="244" fill="#e6edf3" font-size="18" font-weight="700">without its doc</text>
    <text x="1016" y="272" fill="#8b949e" font-size="14">Update the doc and its</text>
    <text x="1016" y="292" fill="#8b949e" font-size="14">diagram in the same change.</text>
  </g>
</svg>
